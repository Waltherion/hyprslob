# High-resolution raw cava config for the HyprSlob visualizer (copy of bar/cava.conf).
[general]
bars = 96
framerate = 30
sensitivity = 100
autosens = 1

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
bar_delimiter = 59
frame_delimiter = 10
